name: json-ai-mcp
description: AI-powered json ai MCP server for agents. Supports validate json, transform
  json, diff json. By MEOK AI Labs.
version: 1.0.0
tools:
- name: validate_json
  description: Validate JSON and report structure details.
  parameters:
  - name: json_string
    type: string
    required: true
  - name: strict
    type: boolean
    required: false
- name: transform_json
  description: 'Transform JSON. Operations: sort_keys, minify, prettify, remove_nulls,
    add_field, remove_field, get_path.'
  parameters:
  - name: json_string
    type: string
    required: true
  - name: operation
    type: string
    required: true
  - name: path
    type: string
    required: false
  - name: value
    type: string
    required: false
- name: diff_json
  description: Compare two JSON objects and find differences.
  parameters:
  - name: json_a
    type: string
    required: true
  - name: json_b
    type: string
    required: true
- name: flatten_json
  description: Flatten nested JSON to single-level with dot-notation keys.
  parameters:
  - name: json_string
    type: string
    required: true
  - name: separator
    type: string
    required: false
  - name: max_depth
    type: integer
    required: false
